  <script>
    const DATA = {"lib": [{"key": "Angle Finance", "aliases": ["angle asset finance", "angle finance"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: Angle Finance's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with Angle Finance.\nLENDER PROFILE — Angle Finance is a Type A (Net Declining Balance) lender. The header 'Account Summary' shows a 'Principal' figure — use that directly as the financed amount, no extraction needed.\nSOURCE OF TRUTH: Angle's amortisation schedule PDF is the source of truth for every date, principal amount, interest amount, repayment, and running balance. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row. Interest is calculated cleanly on the declining balance from day one — there is no month-one pro-rating or zero-interest quirk to account for with this lender.\nHEADER FIELDS: Use the loan contract and tax invoice only to populate header fields — borrower name, ABN, lender name, contract number, settlement date, payment frequency, loan term, financed amount (the header 'Principal' figure), interest rate, regular repayment, balloon amount (if any), asset description, and VIN/serial number. Where a figure conflicts with Angle's schedule, the schedule wins.\nSTEPS: 1. Use the header 'Principal' figure as the financed amount. 2. Populate all header fields from the contract and tax invoice. 3. Replicate Angle's payment schedule row by row into the template. 4. Output the completed Excel file ready to send to the accountant.", "note": null}, {"key": "BOQ Equipment Finance", "aliases": ["boq equipment finance", "boq"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: BOQ Equipment Finance's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with BOQ.\nLENDER PROFILE — BOQ Equipment Finance is a Type B (Gross / Pre-Computed, In Advance) lender. The ‘Contract Balance Plus Residual’ column is NOT the financed amount — it includes all interest baked in from day one.\n⚠ FINANCED AMOUNT: BOQ's schedule header includes an ‘Equipment Cost’ figure — use that directly as the financed amount. Do not calculate it from the balance column.\n⚠ PRO-RATA MONTH ONE: Interest in month one is smaller than month two (not zero) — a pro-rated first period. Do not flag this as an error; replicate it exactly as shown.\nSOURCE OF TRUTH: BOQ's amortisation schedule PDF is the source of truth for every payment date, principal amount, interest amount, and closing balance. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row. Note BOQ labels its interest column ‘Contract Income’, not ‘Interest’ — treat this as the same column for template purposes.\n⚠ BALLOON: BOQ shows the balloon as its own standalone final row, separate from the last regular payment. Enter that row's AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, keeping Principal and Interest as shown for that row.\nHEADER FIELDS: Use the loan contract and tax invoice only to populate header fields — borrower name, ABN, lender name, contract number, settlement date, payment frequency (In Advance), loan term, financed amount (the Equipment Cost figure), interest rate, regular repayment, balloon amount, asset description, and VIN/serial number. Where a figure conflicts with BOQ's schedule, the schedule wins.\nSTEPS: 1. Use the header 'Equipment Cost' figure as the financed amount. 2. Confirm month one's smaller interest is a pro-rata, not an error. 3. Populate all header fields from the contract and tax invoice. 4. Replicate BOQ's payment schedule row by row into the template, including the standalone balloon row. 5. Output the completed Excel file ready to send to the accountant.", "note": null}, {"key": "Capital Finance", "aliases": ["capital finance"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: Capital Finance's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with Capital Finance.\nLENDER PROFILE — Capital Finance is a Type B (Gross / Pre-Computed, Monthly in Advance) lender. The ‘Contract Balance Plus Residual’ column is NOT the financed amount and is not a true principal balance — it is the total contract amount declining by each rent/repayment figure. Do not use it, and do not apply the standard ‘closing balance after payment 1’ fallback for this lender.\n⚠ FINANCED AMOUNT: Capital Finance's schedule header includes a ‘Cost of Goods’ figure — use that figure directly as the financed amount. Do not use ‘Total Contract Amount’ (that figure includes all interest across the full term).\n⚠ CAPITAL-SPECIFIC RULE: Month one's interest is smaller than month two, not zero — this is a pro-rated first period because the lender's fixed due day (e.g. the 15th) doesn't align with the settlement date. Do not flag this as an error or attempt to correct it; replicate it exactly as shown.\nSOURCE OF TRUTH: Capital's amortisation schedule PDF is the source of truth for every payment date, principal amount, interest amount, and repayment figure. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row. Note the column may be labelled ‘Rent’, ‘Repayment’, or ‘Instalment’, and interest may be labelled ‘Notional Interest’ or ‘Interest’, depending on the Product Type field (Goods Loan uses ‘Repayment’ / ‘Interest’) — treat these as the same column for template purposes.\n⚠ BALLOON: Capital schedules typically show a separate balloon as its own final row (commonly month 61), distinct from the regular repayment. Enter that row's AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, keeping Principal and Interest as shown for that row. Confirm the balloon amount against the loan contract.\n⚠ IGNORE PADDING ROWS: Some Capital schedules include a blank row after the final real payment (all zeros) as a report artefact. Confirm the stated Term in Months from the header and ignore any row beyond that term.\nHEADER FIELDS: Use the loan contract and tax invoice only to populate header fields — borrower name, ABN, lender name, contract number, settlement date, payment frequency (Monthly in Advance), loan term, financed amount (the Cost of Goods figure, not Total Contract Amount), interest rate (Finance Rate), regular repayment, balloon amount, asset description, and VIN/serial number. Where a figure conflicts with Capital's schedule, the schedule wins.\nSTEPS: 1. Use the header 'Cost of Goods' figure as the financed amount — do not calculate from the balance column. 2. Confirm the term in months from the header and ignore any padding row beyond it. 3. Populate all header fields from the contract and tax invoice. 4. Replicate Capital's payment schedule row by row into the template, including the pro-rated month-one interest and the standalone balloon row. 5. Output the completed Excel file ready to send to the accountant.", "note": null}, {"key": "COEX Capital", "aliases": ["coex capital", "coex"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: COEX Capital's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with COEX Capital.\nLENDER PROFILE — COEX Capital is a Type A (Net Declining Balance) lender. The header shows a ‘Total Amount Financed’ figure — use that directly as the financed amount, no extraction needed.\n⚠ FIRST ROW: The first row in COEX's schedule is dated at settlement and shows $0.00 across Payment, Principal, and Interest — it's just a snapshot of the opening balance, not a real payment. Skip it when replicating the payment-by-payment schedule; real payments begin the following month.\nSOURCE OF TRUTH: COEX's amortisation schedule PDF is the source of truth for every payment date, principal amount, interest amount, and balance. Do not recalculate, adjust, or override any figures — replicate the real payment rows exactly. COEX also includes a ‘Fiscal Yearly Interest’ column that only populates at fiscal-year-end rows — this is a reporting subtotal, not needed for the template; ignore it.\nHEADER FIELDS: Use the loan contract and tax invoice only to populate header fields — borrower name, ABN, lender name, contract/application number, settlement date, payment frequency, loan term, financed amount (the Total Amount Financed figure), interest rate, regular repayment, balloon amount (if any), asset description, and VIN/serial number. Where a figure conflicts with COEX's schedule, the schedule wins.\nSTEPS: 1. Use the header 'Total Amount Financed' figure as the financed amount. 2. Skip the $0 settlement-date snapshot row. 3. Populate all header fields from the contract and tax invoice. 4. Replicate COEX's real payment rows row by row into the template. 5. Output the completed Excel file ready to send to the accountant.", "note": "Process notes indicate Coex usually goes direct into the schedule without needing Claude at all. A Coex-specific Claude prompt is still provided below in case it's needed for this deal."}, {"key": "Dynamoney", "aliases": ["dynamoney"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: Dynamoney's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with Dynamoney.\nLENDER PROFILE — Dynamoney is a Type A (Net Declining Balance) lender. The opening balance in their schedule equals the actual amount borrowed — use the header ‘Principal Amount’ figure directly as the financed amount, no extraction needed.\n⚠ DYNAMONEY-SPECIFIC RULE: No interest is charged in month one — the first payment is principal-only. Do not flag this as an error; it's expected for this lender. Confirm interest resumes from payment 2 onward.\nSOURCE OF TRUTH: Dynamoney's amortisation schedule PDF is the source of truth for every payment date, principal amount, interest amount, and closing balance. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row, including the $0 interest in month one.\nIf there is a balloon and it appears as its own standalone row, enter that row's AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, keeping Principal and Interest as shown. If combined with the last regular instalment, keep AMOUNT as the regular repayment and enter the balloon separately.\nHEADER FIELDS: Use the loan contract and tax invoice only to populate header fields — borrower name, ABN, lender name, contract number, settlement date, payment frequency, loan term, financed amount, interest rate, regular repayment, balloon amount, asset description, and VIN/serial number. Where a figure conflicts with Dynamoney's schedule, the schedule wins.\nSTEPS: 1. Confirm the Principal Amount header figure and enter it as the financed amount. 2. Confirm month one shows $0 interest, principal-only. 3. Populate all header fields from the contract and tax invoice. 4. Replicate Dynamoney's payment schedule row by row into the template. 5. Output the completed Excel file ready to send to the accountant.", "note": null}, {"key": "Flexi", "aliases": ["flexicommercial", "flexi commercial"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: Flexi's (flexicommercial) amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with Flexi.\nLENDER PROFILE — Flexi is a Type B (Gross / Pre-Computed) lender. The opening ‘Loan’ balance shown at the top of the schedule is NOT the financed amount — it equals the total of every scheduled payment across the full term (principal, interest, and balloon combined), so it is fully gross.\n⚠ IMPORTANT — DO NOT use the standard fallback here: the usual Type B trick (closing balance after payment 1, plus the principal repaid in payment 1) does not work for Flexi. Payment 1 already has $0 interest, so that formula just returns the same inflated opening balance — it does not reveal the true financed amount.\n⚠ FINANCED AMOUNT: Get the true financed amount (Amount Financed / Net Amount Financed) from the signed loan contract instead — it is not derivable from Flexi's schedule alone. Enter that contract figure into the template, then confirm all five Sheet 2 validation checks show ✓ before proceeding.\nSOURCE OF TRUTH FOR PAYMENTS: Even though the financed amount comes from the contract, Flexi's amortisation schedule PDF remains the source of truth for every payment date, principal amount, interest amount, and closing balance — replicate those exactly, row by row, including the $0 interest in payment 1.\n⚠ BALLOON: Flexi shows the balloon as its own standalone final row (commonly month 61), separate from the last regular instalment. Enter that row's AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, keeping Principal and Interest as shown for that row.\nHEADER FIELDS: Use the loan contract and tax invoice to populate header fields — borrower name, ABN, lender name, agreement/application number, settlement date, payment frequency, loan term, financed amount (from the contract, per the note above), interest rate, regular repayment, balloon amount, asset description, and VIN/serial number.\nSTEPS: 1. Get the true financed amount from the loan contract — do NOT derive it from Flexi's schedule. 2. Enter that figure in the template and confirm all five Sheet 2 checks pass. 3. Populate remaining header fields from the contract and tax invoice. 4. Replicate Flexi's payment schedule row by row into the template, including the standalone balloon row. 5. Output the completed Excel file ready to send to the accountant.", "note": null}, {"key": "Metro Finance", "aliases": ["metro finance"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: Metro Finance's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with Metro Finance.\nLENDER PROFILE — Metro Finance is a Type A (Net Declining Balance) lender: the balance declines by the full repayment amount each period. Metro's schedule doesn't show a separate 'Amount Financed' header, and the first row's 'Amount Repayable' figure is the balance AFTER Payment 1 is applied — not the true financed amount.\n⚠ FIRST ROW IS A PAYMENT: No interest is charged in month one — the first payment is principal-only. Do not flag this as an error; it’s expected for this lender. Confirm interest resumes from payment 2 onward.\n⚠ FINANCED AMOUNT: The first row's 'Amount Repayable' is the balance after Payment 1 is applied, not the opening balance. Calculate the true financed amount as (first row's Amount Repayable) + (first row's Repayment). Cross-check this against the signed contract's 'Amount Repayable' field in the Financial Table — they should match exactly to the cent.\n\n⚠ BALLOON — SEPARATE FINAL ROW: The balloon is a genuine standalone final payment, one month after the last regular instalment — not merged into it. For a 60-month term, expect 61 total rows: 60 regular repayments + 1 final balloon-only row. Cross-check against the contract’s repayment structure (“60 of $X monthly, followed by 1 of $Y”) — the total (60 × regular repayment + balloon) should equal the financed amount exactly.\n⚠ DISCOUNT RATE vs DEFAULT RATE: The signed loan contract lists both a Discount Rate and a Default Rate. Do not use any rate from the loan documents as the customer interest rate for the header field — use the Customer Rate from Yakka’s pricing/broker tool instead.\nSOURCE OF TRUTH: Metro's amortisation schedule PDF is the source of truth for every payment date, repayment amount, and interest amount. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row, including the first (settlement-dated) row.\nHEADER FIELDS: Use the loan contract, tax invoice, and Yakka's pricing tool to populate header fields — borrower name, ABN, lender name, loan reference, settlement date, payment frequency (confirm via pricing tool), loan term, financed amount (derived per above), Customer Rate (not a loan-document rate), regular repayment, balloon amount, asset description, and VIN/serial number.\nTEMPLATE NOTE: Put the balloon amount in the dedicated “Balloon Payment” column on its own final row (not the “Amount” column), so it flows into the Financial Year Summary’s “Balloon Paid” figures correctly. The template’s “Principal mismatch” check will likely still show a warning — expected and not an error, since Metro’s Net Declining Balance method doesn’t match the template’s standard reducing-balance assumption. If hardcoding the interest rate rather than letting the template auto-calculate it, check for a red-flagged interest rate cell — this is a conditional formatting false positive tied to the template’s auto-calculated implied rate, and can be safely removed.\nSTEPS: 1. Derive the financed amount from the first row's Amount Repayable + first row's Repayment; verify against the contract. 2. Include the settlement-dated row as Payment 1 (principal-only, $0 interest). 3. Confirm the Customer Rate from Yakka's pricing tool — do not use a loan-document rate. 4. Confirm payment frequency from the pricing tool. 5. Populate all header fields. 6. Replicate all rows (60 regular + 1 standalone balloon) exactly from the PDF, putting the balloon in its own “Balloon Payment” column on the final row. 7. Verify total repayments + balloon = financed amount, then output the completed Excel file ready to send to the accountant.", "note": null}, {"key": "NAB", "aliases": ["national australia bank"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached: NAB's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), the broker quote (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with NAB.\nLENDER PROFILE — NAB is a Type A (Net Declining Balance) lender. The amortisation schedule PDF header shows an \"Amount Financed\" figure — use that directly as the Financed Amount.\nSOURCE OF TRUTH FOR THE PAYMENT TABLE: NAB's amortisation schedule PDF is the source of truth for every payment date (month/year), interest amount, repayment amount, and closing balance. Replicate its real payment rows exactly, row by row — do not recalculate or override these figures. If the PDF includes a trailing rounding row after the balance has effectively reached $0 (a few cents, $0.00 interest/repayment), ignore it — it's a rounding artefact, not a real payment.\nBALLOON PAYMENTS: NAB's amortisation schedule does not show the balloon as a line item — it simply ends with the outstanding balance still owing (the balloon amount). Do not treat that final balance as an error, and do not fabricate an extra payment row to \"zero it out.\" Get the actual Balloon Amount from the broker quote's \"Financing Details\" section (labelled \"A Balloon Payment of $X (Y% of the Loan Amount)\"), not from the loan contract's \"Instalment Amounts\" table — that table's \"irregular\" final figure is the last regular instalment plus the balloon combined into one direct debit, not the balloon on its own.\nPAYMENT DAY-OF-MONTH: The amortisation schedule PDF only gives month/year, not an exact day. Get the actual repayment day (and settlement date) from the broker quote's \"In Arrears Payments / Repayments\" table, which gives explicit start dates (e.g. \"20/07/2025\"). Use that day-of-month consistently for the settlement date and every row in the schedule.\nQUOTE VERSIONING: If the amortisation schedule and broker quote carry different quote suffixes (e.g. \"251640261 A\" vs \"251640261 B\") but matching financials, treat them as versions of the same deal, not a discrepancy — note both references in the Loan Contract No field.\nHEADER FIELDS: Populate from the loan contract, tax invoice, and broker quote — borrower name, ABN, lender name, quote/contract number(s), settlement date, payment frequency, loan term, financed amount, interest rate (customer rate, not the bank's wholesale rate), regular repayment, balloon amount, asset description (include all financed equipment, e.g. truck + pump unit), and VIN/serial number.\nSTEPS: 1. Cross-check all four source documents for consistency before populating anything. 2. Populate all header fields, using the broker quote for settlement date, balloon amount, and payment day-of-month. 3. Replicate NAB's payment schedule row by row into the template, using formulas (not hardcoded values) for any figure that is a simple derivation of two other hardcoded figures (e.g. Principal = Amount − Interest, Cumulative Interest = running total). 4. Recalculate and check for formula errors. 5. If any built-in QA/validation checks in the template flag a mismatch, investigate whether it reflects a genuine discrepancy between source documents (and report it) rather than silently suppressing or forcing it to pass. 6. Output the completed Excel file ready to send to the accountant, with a short summary of any assumptions made (e.g. exact settlement day if not explicitly stated)", "note": null}, {"key": "ScotPac", "aliases": ["scottish pacific", "scotpac"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: ScotPac's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with ScotPac.\n⚠ CORRECTED CLASSIFICATION: ScotPac is a Type A (Net Declining Balance) lender. Its 'Outstanding Amount' column is a genuine declining principal balance — interest each period is calculated on that period's opening balance at a consistent rate, and the opening figure is far smaller than the sum of all payments (unlike a gross/pre-computed schedule). Use the first row's 'Outstanding Amount' figure directly as the financed amount — no extraction needed.\n⚠ SCOTPAC-SPECIFIC RULE: No interest is charged in month one — the first repayment is principal-only, consistent with the declining-balance pattern.\nSOURCE OF TRUTH: ScotPac's amortisation schedule PDF is the source of truth for every period date, principal amount, interest amount, and Outstanding Amount balance. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row.\n⚠ BALLOON: ScotPac shows the balloon as its own standalone final row, separate from the last regular instalment. Enter that row's AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, keeping Principal and Interest as shown for that row.\nHEADER FIELDS: Use the loan contract and tax invoice to populate header fields — borrower name, ABN, lender name, contract number, settlement date, payment frequency, loan term, financed amount (the first row's Outstanding Amount), interest rate, regular repayment, balloon amount, asset description, and VIN/serial number.\nSTEPS: 1. Use the first row's 'Outstanding Amount' figure directly as the financed amount. 2. Confirm month one shows $0 interest, principal-only. 3. Populate all header fields from the contract and tax invoice. 4. Replicate ScotPac's payment schedule row by row into the template, including the standalone balloon row. 5. Output the completed Excel file ready to send to the accountant.", "note": null}, {"key": "Selfco / G&G", "aliases": ["selfco", "group and general"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: Selfco's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with Selfco (G&G).\nLENDER PROFILE — Selfco is a Type A (Net Declining Balance) lender. Use the first row's 'Outstanding Amount' figure directly as the financed amount, no extraction needed.\n⚠ SELFCO-SPECIFIC RULE: No interest is charged in month one — the first repayment is principal-only.\nSOURCE OF TRUTH: Selfco's amortisation schedule PDF is the source of truth for every due date, principal amount, interest amount, and Outstanding Amount balance. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row. The GST column is typically $0.00 and is not needed for the template unless GST genuinely applies.\n⚠ BALLOON (IF PRESENT): Not every Selfco deal has a balloon. If this one does, check whether it appears as a standalone final row (commonly month 61) — if so, enter that row's AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, keeping Principal and Interest as shown.\nHEADER FIELDS: Use the loan contract and tax invoice to populate header fields — borrower name, ABN, lender name, contract number, settlement date, payment frequency, loan term, financed amount (the first row's Outstanding Amount), interest rate, regular repayment, balloon amount (if any), asset description, and VIN/serial number.\nSTEPS: 1. Use the first row's 'Outstanding Amount' figure directly as the financed amount. 2. Confirm month one shows $0 interest, principal-only. 3. Populate all header fields from the contract and tax invoice. 4. Replicate Selfco's payment schedule row by row into the template, checking for a balloon row if applicable. 5. Output the completed Excel file ready to send to the accountant.", "note": "balloon-check"}, {"key": "Westpac", "aliases": ["westpac"], "prompt": "COPY-PASTE PROMPT — CLAUDE COWORK\nI have attached four documents: Westpac's amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. This loan settled with Westpac.\nLENDER PROFILE — Westpac is a Type B (Gross / Pre-Computed, Monthly in Advance) lender, using the same InfoLease-style Contract Amortisation Schedule format as Capital Finance. The ‘Contract Balance Plus Residual’ column is NOT the financed amount — it is the total contract amount declining by each rent/repayment figure. Do not use it, and do not apply the standard ‘closing balance after payment 1’ fallback.\n⚠ FINANCED AMOUNT: Westpac's schedule header includes a ‘Cost of Goods’ figure — use that directly as the financed amount. Do not use ‘Total Contract Amount’ (that includes all interest across the full term).\n⚠ WESTPAC-SPECIFIC RULE: Month one's interest is smaller than month two, not zero — a pro-rated first period because the fixed due day doesn't align with the settlement date. Do not flag this as an error; replicate it exactly as shown.\nSOURCE OF TRUTH: Westpac's amortisation schedule PDF is the source of truth for every payment date, principal amount, interest amount, and repayment figure. Do not recalculate, adjust, or override any figures — replicate the schedule exactly, row by row. The column may be labelled ‘Rent’, ‘Repayment’, or ‘Instalment’, and interest may be labelled ‘Notional Interest’ or ‘Interest’, depending on the Product Type field — treat these as the same column.\n⚠ BALLOON: Westpac shows the balloon as its own standalone final row, separate from the last regular instalment. Enter that row's AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, keeping Principal and Interest as shown for that row.\n⚠ IGNORE PADDING ROWS: Some Westpac schedules include a blank row after the final real payment (all zeros) as a report artefact. Confirm the stated Term in Months from the header and ignore any row beyond that term.\nHEADER FIELDS: Use the loan contract and tax invoice to populate header fields — borrower name, ABN, lender name, contract number, settlement date, payment frequency (Monthly in Advance), loan term, financed amount (the Cost of Goods figure), interest rate (Finance Rate), regular repayment, balloon amount, asset description, and VIN/serial number.\nSTEPS: 1. Use the header 'Cost of Goods' figure as the financed amount — do not calculate from the balance column. 2. Confirm the term in months and ignore any padding row beyond it. 3. Populate all header fields from the contract and tax invoice. 4. Replicate Westpac's payment schedule row by row, including the pro-rated month-one interest and the standalone balloon row. 5. Output the completed Excel file ready to send to the accountant.", "note": null}], "knownGeneric": [{"key": "ANZ Asset Finance", "aliases": ["anz asset finance"], "quirk": "Marked as TBC (to be confirmed) in process notes — no specific guidance documented yet. Flag any issues to Erin or Scott."}, {"key": "Azora Asset Finance", "aliases": ["azora asset finance"], "quirk": "Finance amount includes fees, including brokerage and any doc fees charged."}, {"key": "Commonwealth Bank (CBA)", "aliases": ["commonwealth bank"], "quirk": "Interest and principal are calculated differently to standard lenders."}, {"key": "Finance One", "aliases": ["finance one"], "quirk": "Confirmed as Type A (Net Declining Balance) per process notes."}, {"key": "Leasewise", "aliases": ["leasewise"], "quirk": "No specific quirk documented — use the generic classification prompt."}, {"key": "MoneyTech", "aliases": ["moneytech"], "quirk": "No specific quirk documented — use the generic classification prompt."}, {"key": "Morris Finance", "aliases": ["morris finance"], "quirk": "Confirmed as Type A (Net Declining Balance) per process notes."}, {"key": "Pepper Asset Finance", "aliases": ["pepper asset finance"], "quirk": "Doesn't charge interest in month one."}, {"key": "Plenti Finance", "aliases": ["plenti finance"], "quirk": "Interest and principal are calculated differently to standard lenders."}, {"key": "Resimac Asset Finance", "aliases": ["resimac asset finance"], "quirk": "Interest and principal are calculated differently. If there's a balloon, check whether it's a standalone final payment row."}, {"key": "Shift (Get Capital)", "aliases": ["shift"], "quirk": "Interest and principal are calculated differently to standard lenders."}], "genericPrompt": "Claude Cowork Prompt:\n“I have attached three PDFs and one Excel file: the lender’s amortisation schedule (PDF), the signed loan contract (PDF), the vendor tax invoice (PDF), and the Yakka Finance Amortisation Schedule Excel template. Please read all four documents and complete the following.\nSTEP 1 — CLASSIFY THE LENDER SCHEDULE TYPE\nBefore doing anything else, open the lender’s amortisation schedule PDF and classify it as one of the following two types:\nTYPE A — Net Declining Balance: The opening balance equals the actual amount borrowed. The header will show a figure labelled ‘Amount Financed’, ‘Net Amount’, or ‘Principal’ and the first row of the schedule will match that figure. Lenders in this category include: Angle, Azora, CBA, COEX, Dynamoney, Finance One, G&G / Selfco, Metro, Morris, NAB, Resimac, Selfco.\nTYPE B — Gross / Pre-Computed: The opening balance includes all interest baked in from day one — it is much larger than the actual amount borrowed and must NOT be entered into the template as the financed amount. Lenders in this category include: BOQ, Capital Finance, Flexi (flexicommercial), ScotPac.\nSTEP 2 — SOURCE OF TRUTH AND SCHEDULE HANDLING\nThe lender’s amortisation schedule PDF is the source of truth for all payment figures. Every payment date, principal amount, interest amount, and closing balance must be taken directly and exactly from this document as it appears. Do not recalculate, generate, adjust, or override any figures. The lender’s schedule is gospel — replicate it exactly into the Yakka Finance template.\nIf this is a TYPE A schedule: Use the header figure (Amount Financed / Net Amount / Principal) as the financed amount in the template. Replicate the payment schedule row by row exactly as shown in the lender’s PDF.\nIf this is a TYPE B schedule: Do NOT use the opening balance as the financed amount — it is inflated. Extract the true financed amount using this rule: if the header shows ‘Equipment Cost’, ‘Cost of Goods’, or ‘Amount Financed’ separately, use that figure. If no header figure is available, take the closing balance after payment 1 and add back the principal repaid in payment 1 — this gives the true opening financed amount. Enter that extracted figure as the financed amount in the Yakka Finance template, then replicate the payment schedule row by row exactly as it appears in the lender’s PDF.\nBALLOON PAYMENT ROWS: If the lender’s schedule shows the balloon as a standalone final payment (its own row/period, separate from the last regular instalment — e.g. Resimac, Group & General with balloon), enter that row’s AMOUNT as $0 and put the full balloon figure in the BALLOON PAYMENT column, while Principal and Interest still reflect the lender’s exact split for that payment. If instead the balloon is paid together with the last regular instalment in the same row, keep AMOUNT as the regular repayment and enter the balloon separately in the BALLOON PAYMENT column as the template already assumes.\nSTEP 3 — SECONDARY DOCUMENTS (HEADER FIELDS ONLY)\nThe signed loan contract and vendor tax invoice are secondary reference documents only. Use them solely to populate the header fields in the template:\n• From the loan contract: borrower name, ABN, lender name, contract number, settlement date, payment frequency, loan term (months), financed amount, interest rate, regular repayment amount, and balloon amount (if applicable).\n• From the tax invoice: asset description and VIN or serial number (if not already listed in the loan contract).\nIf any figure in the loan contract or tax invoice differs from what appears in the lender’s amortisation schedule, the lender’s amortisation schedule takes precedence. Do not flag minor rounding differences — simply populate the schedule exactly as the lender has provided it.\nSTEPS TO COMPLETE:\n1. Open the lender’s amortisation schedule PDF and classify it as Type A or Type B using the rules above.\n2. If Type B, extract the true financed amount as described above. If Type A, use the header figure directly. \n3. Open the signed loan contract and extract all header field details listed in Step 3 above.\n4. Open the tax invoice and extract the asset description and VIN or serial number.\n5. Populate the Yakka Finance Excel template: complete all header fields, then replicate the payment-by-payment schedule exactly as it appears in the lender’s PDF — row by row, column by column.\n6. Output the completed Excel file ready to send to the accountant.”"};
    const LIB = DATA.lib;
    const KNOWN_GENERIC = DATA.knownGeneric;
    const GENERIC_PROMPT = DATA.genericPrompt;

    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      const val = params.get(name);
      return (val === null || val === "") ? null : val.trim();
    }

    function findMatches(list, lenderName) {
      const lower = lenderName.toLowerCase();
      const matches = [];
      for (const item of list) {
        for (const alias of item.aliases) {
          if (lower.includes(alias)) {
            if (!matches.includes(item)) matches.push(item);
            break;
          }
        }
      }
      return matches;
    }

    function showMessage(html) { document.getElementById("content").innerHTML = html; }

    function launchCowork(promptText, label, noteHtml) {
      const claudeUrl = "claude://cowork/new?q=" + encodeURIComponent(promptText);
      let html = noteHtml || "";
      if (claudeUrl.length > 14000) {
        const safeText = promptText.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        html += '<div class="warning"><strong>Prompt too long to auto-launch (' + promptText.length + ' characters).</strong></div>' +
          '<p>Copy the prompt below and paste it into Claude Cowork manually:</p>' +
          '<textarea readonly onclick="this.select()">' + safeText + '</textarea>' +
          '<br><button onclick="navigator.clipboard.writeText(document.querySelector(\'textarea\').value)">Copy to clipboard</button>';
        showMessage(html);
      } else {
        html += '<p>Opening Claude Cowork' + (label ? ' for <strong>' + label + '</strong>' : '') + '...</p>' +
          '<p><a id="fallback" href="' + claudeUrl + '">Click here if nothing happens</a></p>';
        showMessage(html);
        window.location.href = claudeUrl;
      }
    }

    const lenderParam = getParam("lender");
    const balloonParam = getParam("balloon");

    if (!lenderParam) {
      showMessage('<div class="error"><strong>No lender set on this Opportunity.</strong><br>' +
        'The Lender field is blank, so no prompt could be selected. Please set the Lender field and try again.</div>');
    } else {
      const libMatches = findMatches(LIB, lenderParam);

      if (libMatches.length > 1) {
        const names = libMatches.map(m => m.key).join(", ");
        showMessage('<div class="error"><strong>Ambiguous match for lender "' + lenderParam + '".</strong><br>' +
          'Matched more than one lender profile (' + names + '). Please flag this to an admin.</div>');
      } else if (libMatches.length === 1) {
        const lender = libMatches[0];
        let noteHtml = "";
        if (lender.note === "balloon-check") {
          const hasBalloon = balloonParam && parseFloat(balloonParam.replace(/[^0-9.]/g, "")) > 0;
          noteHtml = hasBalloon
            ? '<div class="info"><strong>Note:</strong> This Opportunity has a balloon payment. Per process notes, Selfco/G&G balloon payments land in the 61st month, not the 60th.</div>'
            : '<div class="info"><strong>Heads up:</strong> No balloon amount on this Opportunity. Process notes say Selfco/G&G deals with no balloon can usually go direct into the schedule without Claude.</div>';
        } else if (lender.note) {
          noteHtml = '<div class="info"><strong>Note:</strong> ' + lender.note + '</div>';
        }
        launchCowork(lender.prompt, lender.key, noteHtml);
      } else {
        const genMatches = findMatches(KNOWN_GENERIC, lenderParam);
        if (genMatches.length > 1) {
          const names = genMatches.map(m => m.key).join(", ");
          showMessage('<div class="error"><strong>Ambiguous match for lender "' + lenderParam + '".</strong><br>' +
            'Matched more than one lender profile (' + names + '). Please flag this to an admin.</div>');
        } else if (genMatches.length === 1) {
          const g = genMatches[0];
          const noteHtml = '<div class="info"><strong>' + g.key + ' — no full custom prompt yet, using the generic classification prompt.</strong><br>' +
            'Known quirk: ' + g.quirk + '</div>';
          launchCowork(GENERIC_PROMPT, g.key, noteHtml);
        } else {
          const noteHtml = '<div class="info"><strong>No lender-specific info found for "' + lenderParam + '".</strong><br>' +
            'Using the generic Claude Cowork prompt, which has Claude classify the schedule type directly from the uploaded PDF.</div>';
          launchCowork(GENERIC_PROMPT, null, noteHtml);
        }
      }
    }
  </script>
